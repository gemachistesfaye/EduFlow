<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduFlow School Management</title>
    <meta name="description" content="EduFlow School Management System — Staff Login">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe',
                            300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6',
                            600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { transition: background-color 0.3s ease, color 0.3s ease; }
        .login-card { transition: transform 0.2s ease, box-shadow 0.3s ease; }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            transition: all 0.2s ease;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(37,99,235,0.35); }
        .btn-primary:active { transform: translateY(0); }
        .input-field:focus { box-shadow: 0 0 0 3px rgba(37,99,235,0.15); }
        @keyframes fadeIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <!-- Login Container -->
    <div class="w-full max-w-md fade-in">

        <!-- Logo / Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-3xl bg-primary-600 text-white shadow-2xl shadow-primary-300 dark:shadow-primary-900 mb-5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-11 w-11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-slate-800 dark:text-white tracking-tight">EduFlow MS</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">School Management System — Authorised Access Only</p>
        </div>

        <!-- Login Card -->
        <div class="login-card bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-2xl shadow-slate-200 dark:shadow-none border border-slate-100 dark:border-slate-700">

            <!-- Alert box -->
            <div id="alert-box" class="hidden mb-5 p-4 rounded-xl text-sm border"></div>

            <form id="login-form" class="space-y-5" novalidate>
                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5">Email Address</label>
                    <input type="email" id="email" autocomplete="email" required
                        class="input-field w-full px-4 py-3 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-0 focus:border-primary-500 outline-none transition-all placeholder:text-slate-400"
                        placeholder="you@school.edu">
                </div>

                <!-- Password -->
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label for="password" class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
                    </div>
                    <div class="relative">
                        <input type="password" id="password" autocomplete="current-password" required
                            class="input-field w-full px-4 py-3 pr-12 rounded-xl bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white focus:ring-0 focus:border-primary-500 outline-none transition-all placeholder:text-slate-400"
                            placeholder="••••••••">
                        <button type="button" id="toggle-pw" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Remember me -->
                <div class="flex items-center">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-primary-600 bg-slate-100 border-slate-300 rounded focus:ring-primary-500">
                    <label for="remember" class="ml-2 text-sm text-slate-600 dark:text-slate-400">Remember this device</label>
                </div>

                <!-- Submit -->
                <button id="submit-btn" type="submit"
                    class="btn-primary w-full py-3 px-4 text-white font-bold rounded-xl focus:outline-none focus:ring-4 focus:ring-primary-500/40">
                    Sign In
                </button>
            </form>

            <!-- Note -->
            <p class="mt-6 text-center text-xs text-slate-400 dark:text-slate-500">
                This system is for authorised school staff only.<br>Contact your administrator if you need access.
            </p>
        </div>
    </div>

    <script>
        // ── Theme ──────────────────────────────────────────────────────
        (function () {
            const stored = localStorage.getItem('color-theme')
                || localStorage.getItem('theme')
                || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if (stored === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        })();

        // ── Supabase client ────────────────────────────────────────────
        const { createClient } = supabase;
        const sb = createClient(
            'https://agjkullgpuhknfillqfp.supabase.co',
            'sb_publishable_HDyPnD1T3f7BkxbjN0tYkg_icBz6Eci'
        );

        // ── Alert helper ───────────────────────────────────────────────
        function showAlert(msg, type = 'error') {
            const box = document.getElementById('alert-box');
            box.textContent = msg;
            box.className = type === 'error'
                ? 'mb-5 p-4 rounded-xl text-sm border bg-red-50 text-red-700 border-red-200'
                : 'mb-5 p-4 rounded-xl text-sm border bg-green-50 text-green-700 border-green-200';
        }

        // ── Password toggle ────────────────────────────────────────────
        document.getElementById('toggle-pw').addEventListener('click', () => {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        });

        // ── Sign-In ────────────────────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('submit-btn');

            if (!email || !password) { showAlert('Please enter your email and password.'); return; }

            btn.disabled = true;
            btn.textContent = 'Signing in…';

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                showAlert(error.message);
                btn.disabled = false;
                btn.textContent = 'Sign In';
                return;
            }

            // Redirect based on role in user metadata
            const role = data.user?.user_metadata?.role || 'student';
            const routes = {
                admin:   'pages/admin/dashboard.html',
                teacher: 'pages/teacher/dashboard.html',
                student: 'pages/student/dashboard.html',
            };
            window.location.href = routes[role] || routes.student;
        });
    </script>
</body>
</html>
