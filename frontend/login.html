<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduFlow – Portal Login</title>
  <meta name="description" content="EduFlow School Management – Secure Portal Access">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: { 500:'#2D6A4F', 600:'#1B4332', 700:'#132A20' },
            sage:   { 50:'#F4F6F0', 100:'#E6EAE0', 200:'#D0D8C5', 600:'#5A734E', 800:'#32422C' }
          },
          fontFamily: { sans: ['Inter','sans-serif'] }
        }
      }
    }
  </script>

  <style>
    /* active pill */
    .pill-active { background:#fff; color:#1B4332; box-shadow:0 2px 8px rgba(0,0,0,.12); font-weight:700; }
    .pill-inactive { color:rgba(255,255,255,.7); }
    .pill-inactive:hover { color:#fff; }
    /* field focus ring */
    input:focus { outline:none; border-color:#2D6A4F; box-shadow:0 0 0 3px rgba(45,106,79,.2); }
  </style>
</head>

<body class="h-screen flex overflow-hidden font-sans bg-sage-50">

  <!-- ══════════════════════════════════
       LEFT – Branding panel
  ══════════════════════════════════ -->
  <div class="hidden md:flex w-5/12 bg-forest-600 text-white flex-col items-center justify-center p-12 relative overflow-hidden">
    <!-- subtle grid decoration -->
    <div class="absolute inset-0 opacity-10" style="background-image:radial-gradient(circle,#fff 1px,transparent 1px);background-size:28px 28px;"></div>
    <div class="relative text-center space-y-5 max-w-xs">
      <!-- logo -->
      <div class="mx-auto w-16 h-16 rounded-2xl bg-white/10 flex items-center justify-center text-3xl">🎓</div>
      <div>
        <p class="text-xs font-bold tracking-widest uppercase opacity-60 mb-1">EduFlow</p>
        <h1 id="left-title" class="text-3xl font-extrabold leading-snug">Staff Portal</h1>
        <p id="left-subtitle" class="text-sm opacity-80 mt-2">Manage classes, attendance and grades from one place.</p>
      </div>
      <!-- feature bullets -->
      <ul id="left-features" class="text-left text-sm space-y-2 mt-4"></ul>
    </div>
  </div>

  <!-- ══════════════════════════════════
       RIGHT – Login card
  ══════════════════════════════════ -->
  <div class="flex w-full md:w-7/12 items-center justify-center p-6 overflow-y-auto">
    <div class="w-full max-w-md space-y-5">

      <!-- Back to home -->
      <a href="index.html" class="inline-flex items-center gap-2 text-xs font-semibold text-sage-600 hover:text-forest-600 transition-colors">
        <i class="fa-solid fa-arrow-left text-xs"></i> Back to EduFlow
      </a>

      <!-- Portal tabs removed per user request to isolate login flows -->

      <!-- ── Login card ── -->
      <div class="bg-white rounded-2xl shadow-xl border border-sage-100 p-8 space-y-5">

        <!-- heading -->
        <div>
          <h2 id="form-heading" class="text-2xl font-extrabold text-forest-700">Welcome back</h2>
          <p  id="form-subheading" class="text-sm text-sage-600 mt-1">Sign in to your staff account to continue</p>
        </div>

        <!-- alert -->
        <div id="alert-box" class="hidden rounded-lg px-4 py-3 text-sm font-medium"></div>

        <!-- form -->
        <form id="login-form" novalidate class="space-y-4">

          <!-- email -->
          <div>
            <label id="email-label" for="email" class="block text-xs font-semibold text-sage-800 mb-1">Staff Email Address</label>
            <input type="email" id="email" name="email" required
                   placeholder="staff@school.edu"
                   autocomplete="email"
                   class="block w-full rounded-xl border border-sage-200 bg-sage-50 px-4 py-2.5 text-sm transition-all">
          </div>

          <!-- password -->
          <div>
            <label id="password-label" for="password" class="block text-xs font-semibold text-sage-800 mb-1">Password</label>
            <div class="relative">
              <input type="password" id="password" name="password" required
                     placeholder="••••••••"
                     autocomplete="current-password"
                     class="block w-full rounded-xl border border-sage-200 bg-sage-50 px-4 py-2.5 pr-10 text-sm transition-all">
              <button type="button" id="toggle-pw"
                      class="absolute right-3 top-1/2 -translate-y-1/2 text-sage-400 hover:text-sage-700">
                <i class="fa-regular fa-eye text-sm"></i>
              </button>
            </div>
          </div>

          <!-- hidden role field – sent with form submission -->
          <input type="hidden" id="role-field" name="role" value="staff">

          <!-- submit -->
          <button type="submit" id="submit-btn"
                  class="w-full py-3 rounded-xl bg-forest-600 hover:bg-forest-500 text-white font-bold text-sm shadow-md transition-colors">
            Sign In
          </button>
        </form>



        <!-- footer note -->
        <p id="footer-note" class="text-center text-xs text-sage-400">
          Authorised school staff only. Contact your administrator if you need access.
        </p>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       JAVASCRIPT – all portal logic
  ══════════════════════════════════ -->
  <script>
    // ── 1. Portal configuration (replaces Jinja2 PORTAL_CONFIG) ──────────
    const PORTAL_CONFIG = {
      staff: {
        title:         'Staff Portal',
        subtitle:      'Manage classes, attendance and grades from one place.',
        formHeading:   'Welcome back',
        formSub:       'Sign in to your staff account to continue',
        emailLabel:    'Staff Email Address',
        emailPH:       'staff@school.edu',
        passwordLabel: 'Password',
        footerNote:    'Authorised school staff only. Contact your administrator if you need access.',
        demoEmail:     'teacher@eduflow.com',
        demoPass:      'StaffPass123',
        features: [
          '📋 Class registers & attendance tracking',
          '📊 Homework submission & live grade dashboards',
          '🗓️  Conflict-free exam schedule builders',
          '📣 Direct parent communication loops',
          '📈 Real-time operational metric reports'
        ]
      },
      student: {
        title:         'Student Portal',
        subtitle:      'Access your timetable, homework and grade results easily.',
        formHeading:   'Student Sign In',
        formSub:       'Check homework boards, exam timetables and grade reports',
        emailLabel:    'Student Email or ID',
        emailPH:       'student@school.edu',
        passwordLabel: 'Password',
        footerNote:    'Student portal issues? Ask your class teacher to confirm your credentials.',
        demoEmail:     'student@eduflow.com',
        demoPass:      'StudentPass123',
        features: [
          '🗓️  Conflict-free lecture timetables',
          '📦 Homework delivery & resource drawers',
          '📊 Interactive terminal grade reports',
          '🎯 Co-curricular activity registers',
          '💬 Secure student messaging directory'
        ]
      },
      parent: {
        title:         'Parent Portal',
        subtitle:      'Stay connected with your child\'s progress, reports, and notices.',
        formHeading:   'Family Portal Sign In',
        formSub:       'Access student profiles, parent diaries and report cards',
        emailLabel:    'Parent Email Address',
        emailPH:       'parent@school.edu',
        passwordLabel: 'Password',
        footerNote:    'Need help? Contact the school administrative office.',
        demoEmail:     'parent@eduflow.com',
        demoPass:      'ParentPass123',
        features: [
          '📅 Real-time attendance calendars',
          '📄 Digital grade report sheets',
          '🔔 Alerts for unexplained absences',
          '💬 Direct messaging with teachers',
          '📚 Homework lists & project milestones'
        ]
      }
    };

    // ── 2. State ──────────────────────────────────────────────────────────
    let currentPortal = 'staff';

    // ── 3. Render portal config into the DOM ─────────────────────────────
    function renderPortal(portal) {
      const cfg = PORTAL_CONFIG[portal];
      if (!cfg) return;

      // Left panel
      document.getElementById('left-title').textContent    = cfg.title;
      document.getElementById('left-subtitle').textContent = cfg.subtitle;
      const featList = document.getElementById('left-features');
      featList.innerHTML = '';
      cfg.features.forEach(f => {
        const li = document.createElement('li');
        li.className = 'flex items-start gap-2 opacity-90';
        li.textContent = f;
        featList.appendChild(li);
      });

      // Right card
      document.getElementById('form-heading').textContent    = cfg.formHeading;
      document.getElementById('form-subheading').textContent = cfg.formSub;
      document.getElementById('email-label').textContent     = cfg.emailLabel;
      document.getElementById('email').placeholder           = cfg.emailPH;
      document.getElementById('password-label').textContent  = cfg.passwordLabel;
      document.getElementById('footer-note').textContent     = cfg.footerNote;
      document.getElementById('role-field').value            = portal;

      // Removed pill state logic because the UI pills were removed

      // Update browser URL (no page reload)
      const url = new URL(window.location);
      url.searchParams.set('portal', portal);
      history.replaceState({}, '', url);

      currentPortal = portal;
      hideAlert();
    }

    function setPortal(portal) { renderPortal(portal); }

    // ── 4. Alerts ─────────────────────────────────────────────────────────
    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alert-box');
      box.textContent = msg;
      box.className = type === 'success'
        ? 'rounded-lg px-4 py-3 text-sm font-medium bg-emerald-50 text-emerald-800 border border-emerald-200'
        : 'rounded-lg px-4 py-3 text-sm font-medium bg-red-50 text-red-800 border border-red-200';
      box.classList.remove('hidden');
    }
    function hideAlert() {
      document.getElementById('alert-box').classList.add('hidden');
    }

    // ── 5. Password toggle ────────────────────────────────────────────────
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw  = document.getElementById('password');
      const ico = document.querySelector('#toggle-pw i');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      ico.className = pw.type === 'password' ? 'fa-regular fa-eye text-sm' : 'fa-regular fa-eye-slash text-sm';
    });



    // ── 7. Form submit ────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role-field').value;
      const btn      = document.getElementById('submit-btn');

      if (!email || !password) {
        showAlert('Please enter your email and password to continue.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      // Quick mock bypass for offline testing
      const mockMap = {
        'teacher@eduflow.com': { token:'mock_staff',   role:'teacher',  redirect:'pages/admin/dashboard.html' },
        'student@eduflow.com': { token:'mock_student', role:'student',  redirect:'pages/student/dashboard.html' },
        'parent@eduflow.com':  { token:'mock_parent',  role:'parent',   redirect:'pages/parent/dashboard.html' }
      };
      if (mockMap[email]) {
        const m = mockMap[email];
        localStorage.setItem('access_token', m.token);
        localStorage.setItem('user_role',    m.role);
        showAlert('Credentials accepted – redirecting…', 'success');
        setTimeout(() => { window.location.href = m.redirect; }, 900);
        return;
      }

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Invalid credentials. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('user_role',    data.role);

        const routes = {
          admin:           'pages/admin/dashboard.html',
          school_director: 'pages/admin/dashboard.html',
          teacher:         'pages/teacher/dashboard.html',
          student:         'pages/student/dashboard.html',
          parent:          'pages/parent/dashboard.html'
        };
        window.location.href = routes[data.role] || 'index.html';

      } catch (err) {
        showAlert('Network error – using offline demo. Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'index.html#dashboard'; }, 1200);
      }
    });

    // ── 8. Read ?portal= on load and initialise ───────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const portal = params.get('portal') || 'staff';
      renderPortal(['staff','student','parent'].includes(portal) ? portal : 'staff');
    });
  </script>
</body>
</html>
