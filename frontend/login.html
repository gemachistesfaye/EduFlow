<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduFlow – Portal Login</title>
  <meta name="description" content="EduFlow School Management – Secure Portal Access">

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: { 500:'#2D6A4F', 600:'#1B4332', 700:'#132A20', 800:'#0d1d16', 900:'#060e0a' },
            sage:   { 50:'#F4F6F0', 100:'#E6EAE0', 200:'#D0D8C5', 600:'#5A734E', 800:'#32422C' }
          },
          fontFamily: { sans: ['Inter','sans-serif'] }
        }
      }
    }
  </script>

  <style>
    /* field focus ring */
    input:focus { outline:none; box-shadow:0 0 0 3px rgba(45,106,79,.2); }
  </style>
</head>

<body class="h-screen flex overflow-hidden font-sans bg-sage-50">

  <!-- ══════════════════════════════════
       LEFT – Branding panel
  ══════════════════════════════════ -->
  <div id="left-panel" class="hidden md:flex w-5/12 text-white flex-col justify-between p-12 relative overflow-hidden transition-colors duration-500 bg-forest-700">
    <!-- subtle grid decoration -->
    <div class="absolute inset-0 opacity-10" style="background-image:radial-gradient(circle,#fff 1px,transparent 1px);background-size:28px 28px;"></div>
    
    <div class="relative z-10 w-full max-w-sm mx-auto flex flex-col h-full justify-center">
      <!-- logo / icon -->
      <div id="panel-icon" class="text-6xl mb-6 transition-transform duration-500 opacity-90"><i class="fa-solid fa-graduation-cap"></i></div>
      
      <p class="text-xs font-bold tracking-widest uppercase opacity-80 mb-1">EduFlow</p>
      <h1 id="left-title" class="text-4xl font-extrabold leading-snug mb-4">Student Portal</h1>
      <p id="left-subtitle" class="text-sm opacity-90 mb-8 leading-relaxed">Manage timetable, homework and grades easily.</p>
      
      <div class="w-full h-px bg-white/20 mb-8"></div>
      
      <!-- feature bullets -->
      <ul id="left-features" class="text-left text-sm space-y-4 font-medium opacity-90"></ul>
    </div>
    
    <div class="relative z-10 text-xs font-semibold opacity-60 w-full max-w-sm mx-auto">
      © 2026 EDUFLOW SYSTEMS
    </div>
  </div>

  <!-- ══════════════════════════════════
       RIGHT – Login card
  ══════════════════════════════════ -->
  <div class="flex flex-col w-full md:w-7/12 items-center justify-center p-6 overflow-y-auto bg-sage-50">
    <div class="w-full max-w-md relative">

      <!-- Back to home -->
      <a href="index.html" class="inline-flex items-center gap-2 text-sm font-semibold text-forest-700 hover:text-forest-900 transition-colors mb-6 ml-2">
        <i class="fa-solid fa-arrow-left"></i> Back to EduFlow
      </a>

      <!-- ── Login card ── -->
      <div id="login-card" class="rounded-2xl shadow-xl p-8 space-y-6 transition-colors duration-500">

        <!-- heading -->
        <div>
          <h2 id="form-heading" class="text-2xl font-extrabold transition-colors duration-500">Welcome back</h2>
          <p id="form-subheading" class="text-sm opacity-90 mt-1">Sign in to your account.</p>
        </div>

        <!-- alert -->
        <div id="alert-box" class="hidden rounded-lg px-4 py-3 text-sm font-medium"></div>

        <!-- form -->
        <form id="login-form" novalidate class="space-y-5">

          <!-- email -->
          <div>
            <label id="email-label" for="email" class="block text-xs font-bold tracking-wider uppercase mb-2 opacity-90">Email Address</label>
            <input type="email" id="email" name="email" required
                   placeholder="Enter your email"
                   autocomplete="email"
                   class="block w-full rounded-xl border-none bg-sage-50 text-forest-900 px-4 py-3 text-sm transition-all focus:ring-2 focus:ring-sage-200">
          </div>

          <!-- password -->
          <div>
            <label id="password-label" for="password" class="block text-xs font-bold tracking-wider uppercase mb-2 opacity-90">Password</label>
            <div class="relative">
              <input type="password" id="password" name="password" required
                     placeholder="••••••••"
                     autocomplete="current-password"
                     class="block w-full rounded-xl border-none bg-sage-50 text-forest-900 px-4 py-3 pr-10 text-sm transition-all focus:ring-2 focus:ring-sage-200">
              <button type="button" id="toggle-pw"
                      class="absolute right-3 top-1/2 -translate-y-1/2 text-forest-600 hover:text-forest-800">
                <i class="fa-regular fa-eye-slash text-sm"></i>
              </button>
            </div>
          </div>

          <!-- hidden role field – sent with form submission -->
          <input type="hidden" id="role-field" name="role" value="staff">

          <!-- submit -->
          <button type="submit" id="submit-btn"
                  class="w-full py-3.5 rounded-xl text-white font-bold text-sm shadow-md transition-all duration-300 mt-2">
            Sign In
          </button>
        </form>

        <!-- footer note -->
        <p id="footer-note" class="text-center text-xs opacity-70 pt-2">
          Authorised school access only.
        </p>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       JAVASCRIPT – all portal logic
  ══════════════════════════════════ -->
  <script>
    // ── 1. Portal configuration (replaces Jinja2 PORTAL_CONFIG) ──────────
    const PORTAL_CONFIG = {
      staff: {
        title:         'Staff Portal',
        subtitle:      'Manage classes, attendance and grades from one place.',
        formHeading:   'Welcome back Staff',
        formSub:       'Sign in to your staff account.',
        emailLabel:    'STAFF EMAIL ADDRESS',
        emailPH:       'staff@school.edu',
        passwordLabel: 'PASSWORD',
        footerNote:    'Authorised school staff access only.',
        icon:          '<i class="fa-solid fa-user-tie"></i>',
        theme: {
          bg: 'bg-forest-700',
          cardBg: 'bg-white',
          text: 'text-forest-900',
          btn: ['bg-forest-700', 'hover:bg-forest-600']
        },
        features: [
          'Class registers & attendance tracking',
          'Homework submission & live grade dashboards',
          'Conflict-free exam schedule builders',
          'Direct parent communication loops',
          'Real-time operational metric reports'
        ]
      },
      student: {
        title:         'Student Portal',
        subtitle:      'Manage timetable, homework and grades easily.',
        formHeading:   'Welcome back Student',
        formSub:       'Sign in to your student account.',
        emailLabel:    'STUDENT ID / EMAIL ADDRESS',
        emailPH:       'student@school.edu',
        passwordLabel: 'PASSWORD',
        footerNote:    'Authorised school student access only.',
        icon:          '<i class="fa-solid fa-graduation-cap"></i>',
        theme: {
          bg: 'bg-forest-700',
          cardBg: 'bg-white',
          text: 'text-forest-900',
          btn: ['bg-forest-700', 'hover:bg-forest-600']
        },
        features: [
          'Class registers & attendance tracking',
          'Homework submission & live grade dashboards',
          'Interactive terminal grade reports',
          'Co-curricular activity registers',
          'Secure student messaging directory'
        ]
      },
      parent: {
        title:         'Parent Portal',
        subtitle:      'Stay connected with your child\'s progress.',
        formHeading:   'Welcome back Parent',
        formSub:       'Sign in to your parent account.',
        emailLabel:    'PARENT EMAIL ADDRESS',
        emailPH:       'parent@school.edu',
        passwordLabel: 'PASSWORD',
        footerNote:    'Authorised school parent access only.',
        icon:          '<i class="fa-solid fa-users"></i>',
        theme: {
          bg: 'bg-forest-700',
          cardBg: 'bg-white',
          text: 'text-forest-900',
          btn: ['bg-forest-700', 'hover:bg-forest-600']
        },
        features: [
          'Real-time attendance calendars',
          'Digital grade report sheets',
          'Alerts for unexplained absences',
          'Direct messaging with teachers',
          'Homework lists & project milestones'
        ]
      }
    };

    // ── 2. State ──────────────────────────────────────────────────────────
    let currentPortal = 'staff';

    // ── 3. Render portal config into the DOM ─────────────────────────────
    function renderPortal(portal) {
      const cfg = PORTAL_CONFIG[portal];
      if (!cfg) return;

      // Left panel
      document.getElementById('left-title').textContent    = cfg.title;
      document.getElementById('left-subtitle').textContent = cfg.subtitle;
      const featList = document.getElementById('left-features');
      featList.innerHTML = '';
      cfg.features.forEach(f => {
        const li = document.createElement('li');
        li.className = 'flex items-center gap-3';
        li.innerHTML = `<i class="fa-regular fa-circle-check text-sage-200"></i> <span>${f}</span>`;
        featList.appendChild(li);
      });

      // Right card
      document.getElementById('form-heading').textContent    = cfg.formHeading;
      document.getElementById('form-subheading').textContent = cfg.formSub;
      document.getElementById('email-label').textContent     = cfg.emailLabel;
      document.getElementById('email').placeholder           = cfg.emailPH;
      document.getElementById('password-label').textContent  = cfg.passwordLabel;
      document.getElementById('footer-note').textContent     = cfg.footerNote;
      document.getElementById('role-field').value            = portal;
      
      document.getElementById('panel-icon').innerHTML        = cfg.icon;

      // Update styling
      const prevCfg = PORTAL_CONFIG[currentPortal];
      if (prevCfg) {
        document.getElementById('left-panel').classList.remove(prevCfg.theme.bg);
        document.getElementById('login-card').classList.remove(prevCfg.theme.cardBg, prevCfg.theme.text);
        document.getElementById('submit-btn').classList.remove(...prevCfg.theme.btn);
      }
      
      document.getElementById('left-panel').classList.add(cfg.theme.bg);
      document.getElementById('login-card').classList.add(cfg.theme.cardBg, cfg.theme.text);
      document.getElementById('submit-btn').classList.add(...cfg.theme.btn);

      // Update browser URL (no page reload)
      const url = new URL(window.location);
      url.searchParams.set('portal', portal);
      history.replaceState({}, '', url);

      currentPortal = portal;
      hideAlert();
    }

    function setPortal(portal) { renderPortal(portal); }

    // ── 4. Alerts ─────────────────────────────────────────────────────────
    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alert-box');
      box.textContent = msg;
      box.className = type === 'success'
        ? 'rounded-lg px-4 py-3 text-sm font-medium bg-emerald-50 text-emerald-800 border border-emerald-200 mb-4'
        : 'rounded-lg px-4 py-3 text-sm font-medium bg-red-50 text-red-800 border border-red-200 mb-4';
      box.classList.remove('hidden');
    }
    function hideAlert() {
      document.getElementById('alert-box').classList.add('hidden');
    }

    // ── 5. Password toggle ────────────────────────────────────────────────
    document.getElementById('toggle-pw').addEventListener('click', () => {
      const pw  = document.getElementById('password');
      const ico = document.querySelector('#toggle-pw i');
      pw.type = pw.type === 'password' ? 'text' : 'password';
      ico.className = pw.type === 'password' ? 'fa-regular fa-eye text-sm' : 'fa-regular fa-eye-slash text-sm';
    });

    // ── 7. Form submit ────────────────────────────────────────────────────
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role-field').value;
      const btn      = document.getElementById('submit-btn');

      if (!email || !password) {
        showAlert('Please enter your email and password to continue.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      // Quick mock bypass for offline testing
      const mockMap = {
        'teacher@eduflow.com': { token:'mock_staff',   role:'teacher',  redirect:'pages/admin/dashboard.html' },
        'student@eduflow.com': { token:'mock_student', role:'student',  redirect:'pages/student/dashboard.html' },
        'parent@eduflow.com':  { token:'mock_parent',  role:'parent',   redirect:'pages/parent/dashboard.html' }
      };
      if (mockMap[email]) {
        const m = mockMap[email];
        localStorage.setItem('access_token', m.token);
        localStorage.setItem('user_role',    m.role);
        showAlert('Credentials accepted – redirecting…', 'success');
        setTimeout(() => { window.location.href = m.redirect; }, 900);
        return;
      }

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, role })
        });
        const data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'Invalid credentials. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          return;
        }

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('user_role',    data.role);

        const routes = {
          admin:           'pages/admin/dashboard.html',
          school_director: 'pages/admin/dashboard.html',
          teacher:         'pages/teacher/dashboard.html',
          student:         'pages/student/dashboard.html',
          parent:          'pages/parent/dashboard.html'
        };
        window.location.href = routes[data.role] || 'index.html';

      } catch (err) {
        showAlert('Network error – using offline demo. Redirecting…', 'success');
        setTimeout(() => { window.location.href = 'index.html#dashboard'; }, 1200);
      }
    });

    // ── 8. Read ?portal= on load and initialise ───────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const portal = params.get('portal') || 'staff';
      renderPortal(['staff','student','parent'].includes(portal) ? portal : 'staff');
    });
  </script>
</body>
</html>
