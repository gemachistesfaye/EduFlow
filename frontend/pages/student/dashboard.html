<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | EduFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/theme.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🎓</div>
      <div><div class="sidebar-logo-text">EduFlow</div><div class="sidebar-logo-sub">Student Portal</div></div>
    </div>
    <div class="sidebar-section-label">Navigation</div>
    <nav>
      <a href="dashboard.html" class="nav-item active">🏠 &nbsp;Dashboard</a>
      <a href="grades.html" class="nav-item">📈 &nbsp;My Grades</a>
      <a href="attendance.html" class="nav-item">📅 &nbsp;Attendance</a>
      <a href="settings.html" class="nav-item">⚙️ &nbsp;Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:none;background:rgba(239,68,68,.12);color:#f87171;font-size:13px;font-weight:600;cursor:pointer;width:100%;">🚪 &nbsp;Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <div class="header-search">🔍 <input placeholder="Search…" type="text"></div>
      <div class="header-right">
        <div class="header-user"><div class="header-avatar" style="background:var(--green-700);">S</div><span id="student-name">Student</span></div>
      </div>
    </header>

    <div class="page-body">
      <div class="page-title-row">
        <div><div class="page-title">Welcome, Student</div><div class="page-subtitle">Your personal overview</div></div>
      </div>

      <div class="grid-4" style="margin-bottom:24px;">
        <div class="stat-card"><div class="stat-card-icon icon-green">📚</div><div class="stat-card-value" id="t-avg-grade">—</div><div class="stat-card-label">Avg Grade</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-blue">🗓️</div><div class="stat-card-value" id="t-attendance">—</div><div class="stat-card-label">Attendance</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-amber">⏰</div><div class="stat-card-value" id="t-latest">—</div><div class="stat-card-label">Latest Update</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-purple">⚡</div><div class="stat-card-value" id="t-messages">0</div><div class="stat-card-label">Messages</div></div>
      </div>

      <div class="card">
        <div class="card-header">Recent Grades</div>
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>Course</th><th>Exam</th><th>Score</th><th>%</th></tr></thead>
            <tbody id="grades-tbody">
              <tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted);">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('access_token');
  if (!token) window.location.href = '../../login.html';
  document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('access_token'); window.location.href='../../login.html'; };

  async function loadOverview() {
    try {
      const res = await fetch('/api/student/overview', { headers:{ Authorization:'Bearer '+token } });
      const data = await res.json();
      document.getElementById('student-name').textContent = data.name || 'Student';
      document.getElementById('t-avg-grade').textContent = data.average_grade ? data.average_grade+'%' : '—';
      document.getElementById('t-attendance').textContent = data.attendance_rate ? data.attendance_rate+'%' : '—';
      document.getElementById('t-latest').textContent = data.last_update || '—';
    } catch {}
  }

  async function loadGrades() {
    try {
      const res = await fetch('/api/student/grades', { headers:{ Authorization:'Bearer '+token } });
      const data = await res.json();
      const grades = data.grades || [];
      const tb = document.getElementById('grades-tbody');
      if (!grades.length) { tb.innerHTML='<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted);">No grades yet.</td></tr>'; return; }
      tb.innerHTML = grades.map(g => `<tr><td>${g.course_name}</td><td>${g.exam_type}</td><td>${g.score}</td><td>${Math.round(g.score/g.total_marks*100)}%</td></tr>`).join('');
    } catch { document.getElementById('grades-tbody').innerHTML='<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted);">Failed to load.</td></tr>'; }
  }

  loadOverview();
  loadGrades();
</script>
</body>
</html>
