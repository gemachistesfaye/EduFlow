<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Superadmin Dashboard | EduFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <style>
    /* ══ Superadmin Portal – unique dark/violet theme override ══
       These override theme.css variables ONLY for superadmin pages.
       Do NOT copy this block to other portals. */
    :root {
      --sidebar-bg:    #0d0b1e;
      --sidebar-hover: #1e1a3a;
      --sidebar-active:#1e1a3a;
      --sidebar-text:  #c4b5fd;
      --sidebar-label: #a78bfa;

      --bg-main:   #0f0e1a;
      --bg-card:   #16152a;
      --bg-tertiary:#1e1a3a;
      --bg-header: #16152a;

      --text-primary:   #e2e0f0;
      --text-secondary: #9b96c4;
      --text-muted:     #6b6894;

      --accent:       #7c3aed;
      --accent-light: rgba(124,58,237,.15);
      --accent-hover: #6d28d9;

      --border:      rgba(124,58,237,.18);
      --border-color:rgba(124,58,237,.18);
      --shadow-card: 0 2px 12px rgba(0,0,0,.4);
    }
    body { background: var(--bg-main); color: var(--text-primary); }
    .sidebar { background: var(--sidebar-bg); border-right: 1px solid rgba(124,58,237,.15); }
    .sidebar-logo-icon { background: #7c3aed; }
    .nav-item.active { background: #7c3aed; color: #fff; }
    .nav-item:hover   { background: var(--sidebar-hover); color: #fff; }
    .top-header { background: var(--bg-header); border-bottom-color: var(--border); }
    .header-search { background: #1e1a3a; border-color: var(--border); color: var(--text-muted); }
    .header-search input { color: var(--text-primary); }
    .header-user { border-color: var(--border); color: var(--text-primary); }
    .header-user:hover { background: #1e1a3a; }
    .card { background: var(--bg-card); border-color: var(--border); }
    .card-header { background: var(--bg-card); border-bottom-color: var(--border); color: var(--text-primary); }
    .stat-card { background: var(--bg-card); border-color: var(--border); }
    .stat-card-value { color: var(--text-primary); }
    .data-table thead th { background: #1e1a3a; color: var(--text-muted); border-bottom-color: var(--border); }
    .data-table tbody tr { border-bottom-color: var(--border); }
    .data-table tbody tr:hover { background: #1e1a3a; }
    .data-table tbody td { color: var(--text-primary); }
    .form-input, .form-select { background: #1e1a3a; border-color: var(--border); color: var(--text-primary); }
    .form-input:focus, .form-select:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,.2); }
    .form-label { color: var(--text-secondary); }
    .btn-primary { background: #7c3aed; border-color: #7c3aed; }
    .btn-primary:hover { background: #6d28d9; border-color: #6d28d9; }
    .btn-secondary, .btn-outline { background: #1e1a3a; border-color: var(--border); color: var(--text-primary); }
    .icon-blue   { background: rgba(96,165,250,.12);  color: #60a5fa; }
    .icon-green  { background: rgba(52,211,153,.12);  color: #34d399; }
    .icon-amber  { background: rgba(251,191,36,.12);  color: #fbbf24; }
    .icon-purple { background: rgba(167,139,250,.12); color: #a78bfa; }
    .page-title   { color: var(--text-primary); }
    .page-subtitle{ color: var(--text-muted); }
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🎓</div>
      <div><div class="sidebar-logo-text">EduFlow</div><div class="sidebar-logo-sub">Superadmin</div></div>
    </div>
    <div class="sidebar-section-label">Main</div>
    <nav>
      <a href="dashboard.html" class="nav-item active">🏠 &nbsp;Dashboard</a>
      <a href="branches.html" class="nav-item">🌐 &nbsp;Branches</a>
      <a href="users.html" class="nav-item">👥 &nbsp;Users</a>
      <a href="settings.html" class="nav-item">⚙️ &nbsp;Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:none;background:rgba(239,68,68,.12);color:#f87171;font-size:13px;font-weight:600;cursor:pointer;width:100%;">🚪 &nbsp;Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <div class="header-search">🔍 <input placeholder="Search branch…" type="text"></div>
      <div class="header-right">
        <div class="header-user"><div class="header-avatar" style="background:var(--green-800);">S</div><span>Superadmin</span></div>
      </div>
    </header>

    <div class="page-body">
      <div class="page-title-row"><div><div class="page-title">Superadmin Overview</div><div class="page-subtitle">System-wide metrics and recent activity</div></div></div></div>

      <div class="grid-4" style="margin-bottom:24px;">
        <div class="stat-card"><div class="stat-card-icon icon-blue">🏢</div><div class="stat-card-value" id="cnt-branches">—</div><div class="stat-card-label">Branches</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-green">👤</div><div class="stat-card-value" id="cnt-users">—</div><div class="stat-card-label">Total Users</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-amber">💾</div><div class="stat-card-value" id="db-size">—</div><div class="stat-card-label">DB Size</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-purple">⚡</div><div class="stat-card-value" id="uptime">—</div><div class="stat-card-label">Uptime</div></div>
      </div>

      <div class="card">
        <div class="card-header">Recent Branch Activity</div>
        <div style="overflow-x:auto;">
          <table class="data-table"><thead><tr><th>Branch</th><th>Created</th><th>Admins</th></tr></thead><tbody id="branches-tbody"><tr><td colspan="3" style="text-align:center;padding:40px;color:var(--text-muted);">Loading…</td></tr></tbody></table>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
  const token = localStorage.getItem('access_token');
  if (!token) window.location.href = '../../login.html';
  document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('access_token'); window.location.href='../../login.html'; };

  async function loadMetrics() {
    try {
      const res = await fetch('/api/superadmin/metrics', { headers:{ Authorization:'Bearer '+token } });
      const data = await res.json();
      document.getElementById('cnt-branches').textContent = data.branches || '—';
      document.getElementById('cnt-users').textContent = data.users || '—';
      document.getElementById('db-size').textContent = data.db_size || '—';
      document.getElementById('uptime').textContent = data.uptime || '—';
    } catch {}
  }

  async function loadBranches() {
    try {
      const res = await fetch('/api/superadmin/branches', { headers:{ Authorization:'Bearer '+token } });
      const data = await res.json();
      const branches = data.branches || [];
      const tb = document.getElementById('branches-tbody');
      if (!branches.length) { tb.innerHTML='<tr><td colspan="3" style="text-align:center;padding:40px;color:var(--text-muted);">No branches.</td></tr>'; return; }
      tb.innerHTML = branches.map(b=>`<tr><td>${b.name}</td><td>${b.created_at}</td><td>${b.admin_count}</td></tr>`).join('');
    } catch { document.getElementById('branches-tbody').innerHTML='<tr><td colspan="3" style="text-align:center;padding:40px;color:var(--text-muted);">Failed.</td></tr>'; }
  }

  loadMetrics();
  loadBranches();
</script>
</body>
</html>
