<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users | EduFlow Superadmin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/theme.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🎓</div>
      <div><div class="sidebar-logo-text">EduFlow</div><div class="sidebar-logo-sub">Superadmin</div></div>
    </div>
    <div class="sidebar-section-label">Main</div>
    <nav>
      <a href="dashboard.html" class="nav-item">🏠 &nbsp;Dashboard</a>
      <a href="branches.html" class="nav-item">🌐 &nbsp;Branches</a>
      <a href="users.html" class="nav-item active">👥 &nbsp;Users</a>
      <a href="settings.html" class="nav-item">⚙️ &nbsp;Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:none;background:rgba(239,68,68,.12);color:#f87171;font-size:13px;font-weight:600;cursor:pointer;width:100%;">🚪 &nbsp;Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <div class="header-search">🔍 <input id="search-input" placeholder="Search users…" type="text" oninput="filterUsers()"></div>
      <div class="header-right">
        <div class="header-user"><div class="header-avatar" style="background:var(--green-800);">S</div><span>Superadmin</span></div>
      </div>
    </header>

    <div class="page-body">
      <div class="page-title-row">
        <div>
          <div class="page-title">User Management</div>
          <div class="page-subtitle">All registered users across every branch</div>
        </div>
        <button onclick="loadUsers()" class="btn btn-secondary">↻ &nbsp;Refresh</button>
      </div>

      <!-- Stats Row -->
      <div class="grid-4" style="margin-bottom:24px;">
        <div class="stat-card"><div class="stat-card-icon icon-blue">👥</div><div class="stat-card-value" id="cnt-total">—</div><div class="stat-card-label">Total Users</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-green">🎓</div><div class="stat-card-value" id="cnt-students">—</div><div class="stat-card-label">Students</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-amber">👨‍🏫</div><div class="stat-card-value" id="cnt-teachers">—</div><div class="stat-card-label">Teachers</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-purple">👨‍👩‍👧</div><div class="stat-card-value" id="cnt-parents">—</div><div class="stat-card-label">Parents</div></div>
      </div>

      <!-- Users Table -->
      <div class="card">
        <div class="card-header">All System Users</div>
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Branch</th>
                <th>Joined</th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted);">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" style="position:fixed;top:80px;right:24px;z-index:999;display:none;min-width:280px;padding:14px 18px;border-radius:12px;font-size:13px;font-weight:600;box-shadow:0 8px 32px rgba(0,0,0,.4);"></div>

<script>
  const token = localStorage.getItem('access_token');
  if (!token) window.location.href = '../../login.html';

  document.getElementById('logout-btn').onclick = () => {
    localStorage.removeItem('access_token');
    window.location.href = '../../login.html';
  };

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.display = 'block';
    t.style.background = type === 'success' ? 'rgba(16,185,129,.15)' : 'rgba(239,68,68,.15)';
    t.style.border = type === 'success' ? '1px solid rgba(16,185,129,.4)' : '1px solid rgba(239,68,68,.4)';
    t.style.color = type === 'success' ? '#34d399' : '#f87171';
    setTimeout(() => t.style.display = 'none', 4000);
  }

  const ROLE_BADGE = {
    student:    { label: 'Student',   color: '#60a5fa', bg: 'rgba(96,165,250,.12)'  },
    teacher:    { label: 'Teacher',   color: '#34d399', bg: 'rgba(52,211,153,.12)'  },
    parent:     { label: 'Parent',    color: '#f59e0b', bg: 'rgba(245,158,11,.12)'  },
    director:   { label: 'Director',  color: '#a78bfa', bg: 'rgba(167,139,250,.12)' },
    superadmin: { label: 'Superadmin',color: '#f87171', bg: 'rgba(248,113,113,.12)' },
  };

  let allUsers = [];

  function renderTable(users) {
    const tbody = document.getElementById('users-tbody');
    if (!users.length) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted);">No users found.</td></tr>`;
      return;
    }
    tbody.innerHTML = users.map(u => {
      const badge = ROLE_BADGE[u.role] || { label: u.role, color: '#94a3b8', bg: 'rgba(148,163,184,.12)' };
      return `
        <tr>
          <td><strong>${u.full_name || '—'}</strong></td>
          <td style="color:var(--text-muted);font-size:13px;">${u.email}</td>
          <td>
            <span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:${badge.bg};color:${badge.color};">
              ${badge.label}
            </span>
          </td>
          <td>${u.branch_name || '—'}</td>
          <td style="color:var(--text-muted);font-size:12px;">${u.created_at ? u.created_at.slice(0,10) : '—'}</td>
        </tr>`;
    }).join('');
  }

  function filterUsers() {
    const q = document.getElementById('search-input').value.toLowerCase();
    renderTable(allUsers.filter(u =>
      (u.full_name || '').toLowerCase().includes(q) ||
      (u.email || '').toLowerCase().includes(q) ||
      (u.role || '').toLowerCase().includes(q) ||
      (u.branch_name || '').toLowerCase().includes(q)
    ));
  }

  async function loadUsers() {
    try {
      const res = await fetch('/api/superadmin/users', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('access_token');
        window.location.href = '../../login.html';
        return;
      }
      if (!res.ok) { showToast('Could not load users.', 'error'); return; }
      const data = await res.json();
      allUsers = data.users || [];

      // Update stat cards
      document.getElementById('cnt-total').textContent    = allUsers.length;
      document.getElementById('cnt-students').textContent = allUsers.filter(u => u.role === 'student').length;
      document.getElementById('cnt-teachers').textContent = allUsers.filter(u => u.role === 'teacher').length;
      document.getElementById('cnt-parents').textContent  = allUsers.filter(u => u.role === 'parent').length;

      renderTable(allUsers);
    } catch {
      showToast('Network error loading users.', 'error');
    }
  }

  loadUsers();
</script>
</body>
</html>
