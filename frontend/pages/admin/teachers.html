<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teachers | EduFlow Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/admin-theme.css">
  <style>
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:#fff;border-radius:14px;padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
    .modal h2{font-size:17px;font-weight:700;margin-bottom:20px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🎓</div>
      <div><div class="sidebar-logo-text">EduFlow</div><div class="sidebar-logo-sub">School Navigator</div></div>
    </div>
    <div class="sidebar-section-label">Main</div>
    <nav>
      <a href="dashboard.html"  class="nav-item">🏠 &nbsp;Dashboard</a>
      <a href="students.html"   class="nav-item">👥 &nbsp;Students</a>
      <a href="teachers.html"   class="nav-item active">🧑‍🏫 &nbsp;Teachers</a>
      <a href="classes.html"    class="nav-item">🏫 &nbsp;Classes</a>
      <a href="attendance.html" class="nav-item">📅 &nbsp;Attendance</a>
      <a href="grades.html"     class="nav-item">📈 &nbsp;Grades</a>
      <div class="sidebar-section-label">System</div>
      <a href="settings.html"   class="nav-item">⚙️ &nbsp;Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:none;background:rgba(239,68,68,.12);color:#f87171;font-size:13px;font-weight:600;cursor:pointer;width:100%;">🚪 &nbsp;Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <div class="header-search">🔍 <input placeholder="Search teachers…" type="text" id="search-input"></div>
      <div class="header-right">
        <div class="header-user"><div class="header-avatar">A</div><span>Admin</span></div>
      </div>
    </header>

    <div class="page-body">
      <div class="page-title-row">
        <div><div class="page-title">Teachers</div><div class="page-subtitle">Manage all teaching staff</div></div>
        <button class="btn btn-primary" onclick="openModal()">+ Add Teacher</button>
      </div>

      <div class="card">
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>Name</th><th>Email</th><th>Subject</th><th>Phone</th><th>Hired</th><th>Actions</th></tr></thead>
            <tbody id="teachers-tbody">
              <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>Add New Teacher</h2>
    <div id="modal-alert" class="alert alert-error" style="display:none;"></div>
    <form id="add-form">
      <div class="form-row" style="margin-bottom:12px;">
        <div><label class="form-label">Full Name</label><input class="form-input" id="t-name" required></div>
        <div><label class="form-label">Email</label><input class="form-input" id="t-email" type="email" required></div>
      </div>
      <div class="form-row" style="margin-bottom:12px;">
        <div><label class="form-label">Subject</label><input class="form-input" id="t-subject" required></div>
        <div><label class="form-label">Phone</label><input class="form-input" id="t-phone"></div>
      </div>
      <div style="margin-bottom:12px;"><label class="form-label">Hire Date</label><input type="date" class="form-input" id="t-hire"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>


<!-- Confirm Modal -->
<div class="modal-overlay" id="confirm-modal" style="z-index: 1000;">
  <div class="modal" style="max-width: 400px; text-align: center; padding: 32px;">
    <h2 style="font-size: 18px; margin-bottom: 12px;" id="confirm-title">Are you sure?</h2>
    <p style="color: #6b7280; margin-bottom: 24px;" id="confirm-msg">This action cannot be undone.</p>
    <div style="display: flex; gap: 12px; justify-content: center;">
      <button class="btn btn-outline" onclick="closeConfirm()" style="flex: 1;">Cancel</button>
      <button class="btn btn-primary" id="confirm-btn" style="flex: 1; background: #ef4444; color: white; border-color: #ef4444;">Confirm</button>
    </div>
  </div>
</div>

<script>

  let confirmCallback = null;
  function openConfirm(title, msg, callback) {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent = msg;
    confirmCallback = callback;
    document.getElementById('confirm-modal').classList.add('open');
  }
  function closeConfirm() { document.getElementById('confirm-modal').classList.remove('open'); }
  document.getElementById('confirm-btn').onclick = () => { if(confirmCallback) confirmCallback(); closeConfirm(); };

  const token = localStorage.getItem('access_token');
  if (!token) window.location.href = '../../login.html';
  document.getElementById('logout-btn').onclick = () => {
    openConfirm("Log Out", "Are you sure you want to log out of your session?", () => {
      localStorage.removeItem('access_token'); window.location.href = '../../login.html';
    });
  };

  const COLORS=['icon-green','icon-blue','icon-purple','icon-amber'];
  const initials = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  let all = [];
  async function load() {
    try {
      const res = await fetch('/api/admin/teachers', { headers:{ Authorization:'Bearer '+token } });
      const data = await res.json();
      all = data.teachers || data;
      render(all);
    } catch { document.getElementById('teachers-tbody').innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">Could not load.</td></tr>'; }
  }

  function render(list) {
    const tb = document.getElementById('teachers-tbody');
    if (!list.length) { tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;">No teachers found.</td></tr>'; return; }
    tb.innerHTML = list.map((t,i) => `
      <tr>
        <td><div style="display:flex;align-items:center;gap:10px;">
          <div style="width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;" class="${COLORS[i%4]}">${initials(t.name)}</div>
          <span style="font-weight:500;">${t.name}</span></div></td>
        <td>${t.email||'—'}</td>
        <td><span class="badge badge-green">${t.subject}</span></td>
        <td>${t.phone||'—'}</td>
        <td>${t.hire_date||'—'}</td>
        <td>
          <button class="btn btn-outline btn-sm" onclick="openEdit(${t.id})">Edit</button>
          <button class="btn btn-outline btn-sm" style="border-color:#ef4444;color:#ef4444;" onclick="del(${t.id})">Delete</button>
        </td>
      </tr>`).join('');
  }

  document.getElementById('search-input').oninput = e => render(all.filter(t=>t.name.toLowerCase().includes(e.target.value.toLowerCase())));

  let editingId = null;
  function openModal() { 
    editingId = null;
    document.querySelector('#add-modal h2').textContent = 'Add Teacher';
    document.getElementById('add-form').reset();
    document.getElementById('add-modal').classList.add('open'); 
  }
  function openEdit(id) {
    const t = all.find(x => x.id === id);
    if(!t) return;
    editingId = t.id;
    document.querySelector('#add-modal h2').textContent = 'Edit Teacher';
    document.getElementById('t-name').value = t.name || '';
    document.getElementById('t-email').value = t.email || '';
    document.getElementById('t-subject').value = t.subject || '';
    document.getElementById('t-phone').value = t.phone || '';
    document.getElementById('t-hire').value = t.hire_date || '';
    document.getElementById('add-modal').classList.add('open');
  }
  function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

  document.getElementById('add-form').onsubmit = async (e) => {
    e.preventDefault();
    const body = { name:document.getElementById('t-name').value, email:document.getElementById('t-email').value, subject:document.getElementById('t-subject').value, phone:document.getElementById('t-phone').value, hire_date:document.getElementById('t-hire').value };
    const url = editingId ? \`/api/admin/teachers/\${editingId}\` : '/api/admin/teachers';
    const method = editingId ? 'PUT' : 'POST';
    const res = await fetch(url, {
      method: method, headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body: JSON.stringify(body)
    });
    if (res.ok) { closeModal(); load(); }
    else { const d=await res.json(); const a=document.getElementById('modal-alert'); a.textContent=d.error||'Error'; a.style.display='block'; }
  };

  function del(id) {
    openConfirm("Delete Teacher", "Are you sure you want to permanently delete this teacher record?", async () => {
      await fetch(`/api/admin/teachers/${id}`, { method:'DELETE', headers:{Authorization:'Bearer '+token} });
      load();
    });
  }

  load();
</script>
</body>
</html>
