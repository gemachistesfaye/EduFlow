<!--#include virtual="layout.html" -->
<meta name="page-title" content="Subjects">
<div class="page-header flex items-center justify-between mb-6">
  <h2 class="text-2xl font-semibold text-white">Subject Management</h2>
  <button id="btn-add-subject" class="btn-primary flex items-center gap-2">
    <svg class="w-5 h-5"><use href="#heroicon-outline-plus-circle"></use></svg>
    Add Subject
  </button>
</div>

<!-- Table -->
<div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm overflow-x-auto">
  <table class="w-full table-auto text-left">
    <thead class="bg-gray-100 dark:bg-gray-700">
      <tr>
        <th class="p-2 font-medium">Subject Name</th>
        <th class="p-2 font-medium">Code</th>
        <th class="p-2 font-medium">Grade</th>
        <th class="p-2 font-medium">Teacher</th>
        <th class="p-2 font-medium">Credits</th>
        <th class="p-2 font-medium">Status</th>
        <th class="p-2 font-medium">Actions</th>
      </tr>
    </thead>
    <tbody id="subjects-tbody">
      <tr class="animate-pulse"><td colspan="7" class="p-4 text-center text-gray-500 dark:text-gray-400">Loading…</td></tr>
    </tbody>
  </table>
</div>

<!-- Modal -->
<div class="modal-overlay hidden" id="subject-modal">
  <div class="modal w-full max-w-2xl">
    <h2 class="text-xl font-semibold mb-4" id="subject-modal-title">Add Subject</h2>
    <form id="subject-form" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="form-group"><label class="form-label">Subject Name</label><input class="form-input" name="name" required></div>
        <div class="form-group"><label class="form-label">Subject Code</label><input class="form-input" name="code" required></div>
        <div class="form-group"><label class="form-label">Grade Level</label><input class="form-input" name="grade" required></div>
        <div class="form-group"><label class="form-label">Assigned Teacher</label><input class="form-input" name="teacher" required></div>
        <div class="form-group"><label class="form-label">Credit Hours</label><input class="form-input" type="number" name="credits" required></div>
        <div class="form-group"><label class="form-label">Status</label><select class="form-select" name="status" required><option>Active</option><option>Inactive</option></select></div>
        <div class="form-group md:col-span-2"><label class="form-label">Description</label><textarea class="form-input" name="description"></textarea></div>
        <div class="form-group md:col-span-2"><label class="form-label">Academic Year</label><input class="form-input" name="year" required></div>
      </div>
      <div class="flex justify-end gap-3 mt-4">
        <button type="button" class="btn-outline" onclick="closeModal('subject-modal')">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
  const token = localStorage.getItem('access_token');
  if (!token) window.location.href = '../../login.html';
  const { toast, openModal, closeModal } = window.App;

  async function loadSubjects() {
    const tbody = document.getElementById('subjects-tbody');
    tbody.innerHTML = `<tr class="animate-pulse"><td colspan="7" class="p-4 text-center text-gray-500 dark:text-gray-400">Loading…</td></tr>`;
    try {
      const res = await fetch('/api/admin/subjects', { headers: { Authorization: 'Bearer ' + token } });
      const data = await res.json();
      const list = data.subjects || data;
      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center">No subjects found.</td></tr>`;
        return;
      }
      tbody.innerHTML = list.map(s => `
        <tr class="hover:bg-gray-100 dark:hover:bg-gray-700 transition">
          <td class="p-2">${s.name}</td>
          <td class="p-2">${s.code}</td>
          <td class="p-2">${s.grade}</td>
          <td class="p-2">${s.teacher}</td>
          <td class="p-2">${s.credits}</td>
          <td class="p-2"><span class="badge ${s.status === 'Active' ? 'bg-success' : 'bg-gray-400'}">${s.status}</span></td>
          <td class="p-2 space-x-1"><button class="btn-sm btn-outline" onclick="editSubject(${s.id})">Edit</button><button class="btn-sm btn-outline text-danger" onclick="deleteSubject(${s.id})">Delete</button></td>
        </tr>`).join('');
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-red-600">Failed to load.</td></tr>`;
    }
  }

  let editId = null;
  window.openSubjectModal = () => {
    editId = null;
    document.getElementById('subject-modal-title').textContent = 'Add Subject';
    document.getElementById('subject-form').reset();
    openModal('subject-modal');
  };
  document.getElementById('btn-add-subject').addEventListener('click', openSubjectModal);

  window.editSubject = async (id) => {
    editId = id;
    document.getElementById('subject-modal-title').textContent = 'Edit Subject';
    const res = await fetch(`/api/admin/subjects/${id}`, { headers: { Authorization: 'Bearer ' + token } });
    const s = await res.json();
    const f = document.getElementById('subject-form');
    f.name.value = s.name; f.code.value = s.code; f.grade.value = s.grade; f.teacher.value = s.teacher; f.credits.value = s.credits; f.status.value = s.status; f.description.value = s.description; f.year.value = s.year;
    openModal('subject-modal');
  };

  document.getElementById('subject-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const method = editId ? 'PUT' : 'POST';
    const url = editId ? `/api/admin/subjects/${editId}` : '/api/admin/subjects';
    try {
      const res = await fetch(url, { method, headers: { Authorization: 'Bearer ' + token }, body: fd });
      if (!res.ok) throw new Error(await res.text());
      toast('Subject saved', 'success');
      closeModal('subject-modal');
      loadSubjects();
    } catch (err) { toast('Save failed', 'error'); }
  });

  window.deleteSubject = async (id) => {
    openConfirm('Delete Subject', 'Are you sure you want to delete this subject?', async () => {
      try {
        const res = await fetch(`/api/admin/subjects/${id}`, { method: 'DELETE', headers: { Authorization: 'Bearer ' + token } });
        if (!res.ok) throw new Error(await res.text());
        toast('Subject deleted', 'success');
        loadSubjects();
      } catch (e) { toast('Delete failed', 'error'); }
    });
  };

  loadSubjects();
</script>
