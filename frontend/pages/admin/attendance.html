<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance | EduFlow Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/theme.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🎓</div>
      <div><div class="sidebar-logo-text">EduFlow</div><div class="sidebar-logo-sub">School Navigator</div></div>
    </div>
    <div class="sidebar-section-label">Main</div>
    <nav>
      <a href="dashboard.html"  class="nav-item">🏠 &nbsp;Dashboard</a>
      <a href="students.html"   class="nav-item">👥 &nbsp;Students</a>
      <a href="teachers.html"   class="nav-item">🧑‍🏫 &nbsp;Teachers</a>
      <a href="classes.html"    class="nav-item">🏫 &nbsp;Classes</a>
      <a href="attendance.html" class="nav-item active">📅 &nbsp;Attendance</a>
      <a href="grades.html"     class="nav-item">📈 &nbsp;Grades</a>
      <div class="sidebar-section-label">System</div>
      <a href="settings.html"   class="nav-item">⚙️ &nbsp;Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:none;background:rgba(239,68,68,.12);color:#f87171;font-size:13px;font-weight:600;cursor:pointer;width:100%;">🚪 &nbsp;Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <div class="header-search">🔍 <input placeholder="Search student…" type="text" id="search-input"></div>
      <div class="header-right">
        <div class="header-user"><div class="header-avatar">A</div><span>Admin</span></div>
      </div>
    </header>

    <div class="page-body">
      <div class="page-title-row">
        <div><div class="page-title">Attendance</div><div class="page-subtitle">Track daily student attendance</div></div>
        <div style="display:flex;gap:10px;align-items:center;">
          <input type="date" class="form-input" id="att-date" style="width:auto;" value="">
          <button class="btn btn-primary" onclick="loadAttendance()">Load</button>
        </div>
      </div>

      <!-- Summary cards -->
      <div class="grid-4" style="margin-bottom:24px;">
        <div class="stat-card"><div class="stat-card-icon icon-green">✅</div><div class="stat-card-value" id="cnt-present">—</div><div class="stat-card-label">Present</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-red">❌</div><div class="stat-card-value" id="cnt-absent">—</div><div class="stat-card-label">Absent</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-amber">⏰</div><div class="stat-card-value" id="cnt-late">—</div><div class="stat-card-label">Late</div></div>
        <div class="stat-card"><div class="stat-card-icon icon-blue">📊</div><div class="stat-card-value" id="cnt-rate">—</div><div class="stat-card-label">Rate</div></div>
      </div>

      <div class="card">
        <div class="card-header">Attendance Records <span id="date-label" style="font-weight:400;color:var(--text-muted);font-size:12.5px;"></span></div>
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>Student</th><th>Class</th><th>Date</th><th>Status</th></tr></thead>
            <tbody id="att-tbody">
              <tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted);">Select a date and click Load.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('access_token');
  if (!token) window.location.href = '../../login.html';
  document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('access_token'); window.location.href='../../login.html'; };

  // default to today
  document.getElementById('att-date').value = new Date().toISOString().split('T')[0];

  const statusBadge = s => s==='Present' ? '<span class="badge badge-green">Present</span>' : s==='Absent' ? '<span class="badge badge-red">Absent</span>' : '<span class="badge badge-amber">Late</span>';

  async function loadAttendance() {
    const date = document.getElementById('att-date').value;
    document.getElementById('date-label').textContent = '— ' + date;
    try {
      const res = await fetch(`/api/admin/attendance?date=${date}`, { headers:{ Authorization:'Bearer '+token } });
      const data = await res.json();
      const records = data.attendance || data || [];
      const tb = document.getElementById('att-tbody');
      if (!records.length) { tb.innerHTML='<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted);">No records for this date.</td></tr>'; return; }
      tb.innerHTML = records.map(r => `<tr>
        <td style="font-weight:500;">${r.student_name || ('Student #'+r.student_id)}</td>
        <td>${r.class_name || '—'}</td>
        <td>${r.date}</td>
        <td>${statusBadge(r.status)}</td>
      </tr>`).join('');
      const present = records.filter(r=>r.status==='Present').length;
      const absent  = records.filter(r=>r.status==='Absent').length;
      const late    = records.filter(r=>r.status==='Late').length;
      document.getElementById('cnt-present').textContent = present;
      document.getElementById('cnt-absent').textContent  = absent;
      document.getElementById('cnt-late').textContent    = late;
      document.getElementById('cnt-rate').textContent    = Math.round(present/records.length*100) + '%';
    } catch {
      document.getElementById('att-tbody').innerHTML='<tr><td colspan="4" style="text-align:center;padding:40px;color:var(--text-muted);">Failed to load attendance.</td></tr>';
    }
  }

  document.getElementById('search-input').oninput = e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('#att-tbody tr').forEach(r => {
      r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  };

  loadAttendance();
</script>
</body>
</html>
