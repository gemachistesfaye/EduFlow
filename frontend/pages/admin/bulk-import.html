<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – Bulk Import | EduFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <link rel="stylesheet" href="../../assets/css/admin-theme.css">
  <style>
    .upload-card { background:#222; padding:1.5rem; border-radius:0.8rem; margin-bottom:2rem; }
    .upload-card h2 { margin-top:0; color:#fff; }
    .status { margin-top:0.6rem; font-size:0.9rem; }
    button { background:#0d6efd; color:#fff; border:none; padding:0.5rem 1rem; border-radius:0.4rem; cursor:pointer; }
    button:hover { background:#0b5ed7; }
  </style>
</head>
<body>
<div class="app-shell">
  <!-- Sidebar (copy from dashboard for consistency) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🎓</div>
      <div>
        <div class="sidebar-logo-text">EduFlow</div>
        <div class="sidebar-logo-sub">School Navigator</div>
      </div>
    </div>
    <div class="sidebar-section-label">Main</div>
    <nav>
      <a href="dashboard.html" class="nav-item" data-page="dashboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="students.html" class="nav-item" data-page="students">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Students
      </a>
      <a href="teachers.html" class="nav-item" data-page="teachers">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Teachers
      </a>
      <!-- Bulk Import link injected by script -->
      <a href="bulk-import.html" class="nav-item" data-page="bulk-import">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/><polyline points="12 12 12 3 8 7 12 3 16 7"/><line x1="12" y1="12" x2="12" y2="21"/></svg>
        Bulk Import
      </a>
      <a href="classes.html" class="nav-item" data-page="classes">
        <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Classes
      </a>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:none;background:rgba(239,68,68,.12);color:#f87171;font-size:13px;font-weight:600;cursor:pointer;width:100%;transition:background .13s;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <div class="header-right">
        <div class="header-user" id="user-display">
          <div class="header-avatar" id="user-avatar">A</div>
          <span id="user-name">Admin</span>
        </div>
      </div>
    </header>
    <div class="page-body">
      <h1 style="margin-bottom:1rem;color:#fff;">Bulk Import</h1>
      <div class="upload-card">
        <h2>Import Teachers</h2>
        <form id="teacherForm" enctype="multipart/form-data">
          <input type="file" name="excel" accept=".xlsx,.xls,.csv" required />
          <button type="submit">Upload Teachers</button>
          <div class="status" id="teacherStatus"></div>
        </form>
      </div>
      <div class="upload-card">
        <h2>Import Students</h2>
        <form id="studentForm" enctype="multipart/form-data">
          <input type="file" name="excel" accept=".xlsx,.xls,.csv" required />
          <button type="submit">Upload Students</button>
          <div class="status" id="studentStatus"></div>
        </form>
      </div>
    </div>
  </div>
</div>
<script>
  const token = localStorage.getItem('access_token');
  if (!token) { window.location.href = '../../login.html'; }
  document.getElementById('logout-btn').addEventListener('click', () => {
    if (confirm('Logout?')) { localStorage.removeItem('access_token'); window.location.href = '../../login.html'; }
  });

  async function upload(url, form, statusEl) {
    statusEl.textContent = '⏳ Uploading...';
    const fd = new FormData(form);
    try {
      const res = await fetch(url, { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd });
      const data = await res.json();
      if (res.ok) {
        const created = data.created_teachers ?? data.created_students ?? 0;
        statusEl.textContent = `✅ Success – created ${created} records`;
        if (data.errors && data.errors.length) statusEl.textContent += `, ${data.errors.length} errors`;
      } else {
        statusEl.textContent = `❌ ${data.error || 'Upload failed'}`;
      }
    } catch (e) {
      statusEl.textContent = '❌ Network error';
      console.error(e);
    }
  }

  document.getElementById('teacherForm').addEventListener('submit', e => { e.preventDefault(); upload('/admin/bulk-import/teachers', e.target, document.getElementById('teacherStatus')); });
  document.getElementById('studentForm').addEventListener('submit', e => { e.preventDefault(); upload('/admin/bulk-import/students', e.target, document.getElementById('studentStatus')); });
</script>
</body>
</html>
