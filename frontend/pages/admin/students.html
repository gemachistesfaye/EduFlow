<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students | EduFlow Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <style>
    .avatar-circle { width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px; }
    .modal-overlay { display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#fff;border-radius:14px;padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.15); }
    .modal h2 { font-size:17px;font-weight:700;margin-bottom:20px;color:var(--text-primary); }
    .form-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
  </style>
</head>
<body>
<div class="app-shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🎓</div>
      <div><div class="sidebar-logo-text">EduFlow</div><div class="sidebar-logo-sub">School Navigator</div></div>
    </div>
    <div class="sidebar-section-label">Main</div>
    <nav>
      <a href="dashboard.html"  class="nav-item">🏠 &nbsp;Dashboard</a>
      <a href="students.html"   class="nav-item active">👥 &nbsp;Students</a>
      <a href="teachers.html"   class="nav-item">🧑‍🏫 &nbsp;Teachers</a>
      <a href="classes.html"    class="nav-item">🏫 &nbsp;Classes</a>
      <a href="attendance.html" class="nav-item">📅 &nbsp;Attendance</a>
      <a href="grades.html"     class="nav-item">📈 &nbsp;Grades</a>
      <div class="sidebar-section-label">System</div>
      <a href="settings.html"   class="nav-item">⚙️ &nbsp;Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:none;background:rgba(239,68,68,.12);color:#f87171;font-size:13px;font-weight:600;cursor:pointer;width:100%;">🚪 &nbsp;Logout</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <header class="top-header">
      <div class="header-search">
        🔍 <input placeholder="Search students…" type="text" id="search-input">
      </div>
      <div class="header-right">
        <div class="header-user"><div class="header-avatar">A</div><span>Admin</span></div>
      </div>
    </header>

    <div class="page-body">
      <div class="page-title-row">
        <div><div class="page-title">Students</div><div class="page-subtitle">Manage all enrolled students</div></div>
        <button class="btn btn-primary" onclick="openModal()">+ Add Student</button>
      </div>

      <!-- Filters -->
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
        <select class="form-select" style="width:auto;" id="filter-class">
          <option value="">All Classes</option>
          <option>Grade 9</option><option>Grade 10</option><option>Grade 11</option><option>Grade 12</option>
        </select>
        <select class="form-select" style="width:auto;" id="filter-status">
          <option value="">All Status</option>
          <option>Active</option><option>Pending</option><option>Inactive</option>
        </select>
      </div>

      <!-- Table -->
      <div class="card">
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>Student</th><th>ID</th><th>Class</th><th>Gender</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="students-tbody">
              <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">Loading students…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Student Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h2>Add New Student</h2>
    <div id="modal-alert" class="alert alert-error" style="display:none;"></div>
    <form id="add-student-form">
      <div class="form-row" style="margin-bottom:12px;">
        <div><label class="form-label">Full Name</label><input class="form-input" id="s-name" placeholder="Abebe Girma" required></div>
        <div><label class="form-label">Student ID</label><input class="form-input" id="s-id" placeholder="STU-001" required></div>
      </div>
      <div class="form-row" style="margin-bottom:12px;">
        <div><label class="form-label">Gender</label>
          <select class="form-select" id="s-gender">
            <option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
        <div><label class="form-label">Date of Birth</label><input type="date" class="form-input" id="s-dob"></div>
      </div>
      <div class="form-row" style="margin-bottom:12px;">
        <div><label class="form-label">Phone</label><input class="form-input" id="s-phone" placeholder="+251…"></div>
        <div><label class="form-label">Class ID</label><input class="form-input" id="s-class" placeholder="1" type="number"></div>
      </div>
      <div style="margin-bottom:20px;"><label class="form-label">Address</label><input class="form-input" id="s-address" placeholder="Addis Ababa"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Student</button>
      </div>
    </form>
  </div>
</div>

<script>
  const token = localStorage.getItem('access_token');
  if (!token) window.location.href = '../../login.html';

  document.getElementById('logout-btn').onclick = () => {
    localStorage.removeItem('access_token'); window.location.href = '../../login.html';
  };

  const COLORS = ['icon-green','icon-blue','icon-purple','icon-amber','icon-red'];
  function initials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
  function colorFor(id) { return COLORS[id % COLORS.length]; }

  let allStudents = [];

  async function loadStudents() {
    try {
      const res = await fetch('/api/admin/students', { headers: { Authorization: 'Bearer ' + token } });
      if (!res.ok) throw new Error();
      const data = await res.json();
      allStudents = data.students || data;
      renderTable(allStudents);
    } catch {
      document.getElementById('students-tbody').innerHTML =
        '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">Could not load students.</td></tr>';
    }
  }

  function renderTable(students) {
    const tbody = document.getElementById('students-tbody');
    if (!students.length) { tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">No students found.</td></tr>'; return; }
    tbody.innerHTML = students.map(s => `
      <tr>
        <td><div style="display:flex;align-items:center;gap:10px;">
          <div class="avatar-circle ${colorFor(s.id)}">${initials(s.name)}</div>
          <span style="font-weight:500;">${s.name}</span>
        </div></td>
        <td>${s.student_id}</td>
        <td>Class ${s.class_id}</td>
        <td>${s.gender}</td>
        <td><span class="badge badge-green">Active</span></td>
        <td><button class="btn btn-outline btn-sm" onclick="deleteStudent(${s.id})">Delete</button></td>
      </tr>`).join('');
  }

  // Search / filter
  document.getElementById('search-input').oninput = filter;
  document.getElementById('filter-class').onchange = filter;
  document.getElementById('filter-status').onchange = filter;
  function filter() {
    const q = document.getElementById('search-input').value.toLowerCase();
    renderTable(allStudents.filter(s => s.name.toLowerCase().includes(q)));
  }

  function openModal()  { document.getElementById('add-modal').classList.add('open'); }
  function closeModal() { document.getElementById('add-modal').classList.remove('open'); }

  document.getElementById('add-student-form').onsubmit = async (e) => {
    e.preventDefault();
    const body = {
      name: document.getElementById('s-name').value,
      student_id: document.getElementById('s-id').value,
      gender: document.getElementById('s-gender').value,
      date_of_birth: document.getElementById('s-dob').value,
      phone: document.getElementById('s-phone').value,
      class_id: parseInt(document.getElementById('s-class').value),
      address: document.getElementById('s-address').value,
    };
    const res = await fetch('/api/admin/students', {
      method: 'POST', headers: { 'Content-Type':'application/json', Authorization:'Bearer '+token },
      body: JSON.stringify(body)
    });
    if (res.ok) { closeModal(); loadStudents(); }
    else { const d = await res.json(); document.getElementById('modal-alert').textContent = d.error||'Error'; document.getElementById('modal-alert').style.display='block'; }
  };

  async function deleteStudent(id) {
    if (!confirm('Delete this student?')) return;
    await fetch(`/api/admin/students/${id}`, { method:'DELETE', headers:{ Authorization:'Bearer '+token } });
    loadStudents();
  }

  loadStudents();
</script>
</body>
</html>
