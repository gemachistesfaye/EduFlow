<!--#include virtual="layout.html" -->
<div id="CONTENT_PLACEHOLDER">
  <header class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-semibold text-white">Student Management</h2>
    <div class="flex gap-2">
      <button id="btn-add-student" class="btn-primary flex items-center gap-2"><svg class="w-5 h-5"><use href="#heroicon-outline-plus-circle"></use></svg> Add Student</button>
      <button id="btn-import-students" class="btn-outline flex items-center gap-2"><svg class="w-5 h-5"><use href="#heroicon-outline-arrow-up-tray"></use></svg> Import CSV/Excel</button>
    </div>
  </header>

  <!-- Filters -->
  <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
    <input type="text" id="search-students" placeholder="Search students…" class="input-base">
    <select id="filter-grade" class="select-base"><option value="">All Grades</option></select>
    <select id="filter-status" class="select-base"><option value="">All Statuses</option><option value="Active">Active</option><option value="Inactive">Inactive</option></select>
  </section>

  <!-- Table -->
  <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm overflow-x-auto">
    <table class="w-full table-auto text-left">
      <thead class="bg-gray-100 dark:bg-gray-700">
        <tr>
          <th class="p-2 font-medium">Student</th>
          <th class="p-2 font-medium">ID</th>
          <th class="p-2 font-medium">Class</th>
          <th class="p-2 font-medium">Gender</th>
          <th class="p-2 font-medium">Status</th>
          <th class="p-2 font-medium">Actions</th>
        </tr>
      </thead>
      <tbody id="students-tbody">
        <tr class="animate-pulse"><td colspan="6" class="p-4 text-center text-gray-500 dark:text-gray-400">Loading…</td></tr>
      </tbody>
    </table>
  </div>

  <div class="flex justify-end mt-4" id="students-pagination"></div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay hidden" id="student-modal">
    <div class="modal w-full max-w-2xl">
      <h2 class="text-xl font-semibold mb-4" id="student-modal-title">Add Student</h2>
      <form id="student-form">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-group"><label class="form-label">First Name</label><input class="form-input" name="first_name" required></div>
          <div class="form-group"><label class="form-label">Last Name</label><input class="form-input" name="last_name" required></div>
          <div class="form-group"><label class="form-label">Gender</label><select class="form-select" name="gender" required><option>Male</option><option>Female</option><option>Other</option></select></div>
          <div class="form-group"><label class="form-label">Date of Birth</label><input type="date" class="form-input" name="dob" required></div>
          <div class="form-group"><label class="form-label">Photo</label><input type="file" accept="image/*" class="form-input" name="photo"></div>
          <div class="form-group"><label class="form-label">Status</label><select class="form-select" name="status" required><option>Active</option><option>Inactive</option></select></div>
        </div>
        <hr class="my-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="form-group"><label class="form-label">Grade</label><select class="form-select" name="grade" required></select></div>
          <div class="form-group"><label class="form-label">Section</label><input class="form-input" name="section" required></div>
          <div class="form-group"><label class="form-label">Academic Year</label><input class="form-input" name="year" placeholder="2023/2024" required></div>
        </div>
        <hr class="my-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-group"><label class="form-label">Parent Name</label><input class="form-input" name="parent_name" required></div>
          <div class="form-group"><label class="form-label">Parent Phone</label><input type="tel" class="form-input" name="parent_phone" required></div>
          <div class="form-group"><label class="form-label">Parent Email</label><input type="email" class="form-input" name="parent_email" required></div>
        </div>
        <hr class="my-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-group"><label class="form-label">Username</label><input class="form-input" name="username" required></div>
          <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" name="password" required></div>
        </div>
        <div class="flex justify-end gap-3 mt-6">
          <button type="button" class="btn-outline" onclick="closeModal('student-modal')">Cancel</button>
          <button type="submit" class="btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Import Modal -->
  <div class="modal-overlay hidden" id="import-modal">
    <div class="modal w-full max-w-md">
      <h2 class="text-xl font-semibold mb-4">Import Students</h2>
      <form id="import-form" class="space-y-4">
        <div><label class="form-label">Select CSV / Excel</label><input type="file" accept=".xlsx,.xls,.csv" class="form-input" name="excel" required></div>
        <div class="flex justify-end gap-2">
          <button type="button" class="btn-outline" onclick="closeModal('import-modal')">Cancel</button>
          <button type="submit" class="btn-primary">Upload</button>
        </div>
        <div id="import-alert" class="alert alert-error hidden"></div>
      </form>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('access_token');
  if (!token) window.location.href = '../../login.html';
  const { toast, openModal, closeModal } = window.App;

  // Load students
  async function loadStudents(page = 1, query = '') {
    const tbody = document.getElementById('students-tbody');
    tbody.innerHTML = `<tr class="animate-pulse"><td colspan="6" class="p-4 text-center text-gray-500 dark:text-gray-400">Loading…</td></tr>`;
    try {
      const res = await fetch(`/api/admin/students?page=${page}&search=${encodeURIComponent(query)}`,{ headers:{ Authorization:'Bearer '+token } });
      const data = await res.json();
      const list = data.students || data;
      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center">No students found.</td></tr>`;
        return;
      }
      tbody.innerHTML = list.map(s => `
        <tr class="hover:bg-gray-100 dark:hover:bg-gray-700 transition">
          <td class="p-2 flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-${s.gender==='Male'?'blue':'pink'}-500 flex items-center justify-center text-white text-xs">${s.first_name[0]}${s.last_name[0]}</div>
            ${s.first_name} ${s.last_name}
          </td>
          <td class="p-2">${s.student_id}</td>
          <td class="p-2">${s.class_name||'—'}</td>
          <td class="p-2">${s.gender}</td>
          <td class="p-2"><span class="badge ${s.status==='Active'?'bg-success':'bg-gray-400'}">${s.status}</span></td>
          <td class="p-2 space-x-1">
            <button class="btn-sm btn-outline" onclick="editStudent(${s.id})">Edit</button>
            <button class="btn-sm btn-outline text-danger" onclick="deleteStudent(${s.id})">Delete</button>
          </td>
        </tr>`).join('');
      renderPagination(data.totalPages||1, page);
    } catch (e) {
      tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-red-600">Failed to load.</td></tr>`;
    }
  }

  function renderPagination(total, current) {
    const container = document.getElementById('students-pagination');
    container.innerHTML = '';
    for (let i=1;i<=total;i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.className = i===current ? 'btn-primary' : 'btn-outline';
      btn.onclick = () => loadStudents(i, document.getElementById('search-students').value);
      container.appendChild(btn);
    }
  }

  document.getElementById('search-students').addEventListener('input', e => loadStudents(1, e.target.value));

  // Add / Edit logic
  let editId = null;
  window.openStudentModal = () => { editId = null; document.getElementById('student-modal-title').textContent='Add Student'; document.getElementById('student-form').reset(); openModal('student-modal'); };
  window.editStudent = async (id) => {
    editId = id;
    document.getElementById('student-modal-title').textContent='Edit Student';
    const res = await fetch(`/api/admin/students/${id}`,{ headers:{ Authorization:'Bearer '+token } });
    const s = await res.json();
    const f = document.getElementById('student-form');
    f.first_name.value = s.first_name; f.last_name.value=s.last_name; f.gender.value=s.gender; f.dob.value=s.dob?.split('T')[0]; f.status.value=s.status; f.grade.value=s.grade; f.section.value=s.section; f.year.value=s.year; f.parent_name.value=s.parent_name; f.parent_phone.value=s.parent_phone; f.parent_email.value=s.parent_email; f.username.value=s.username; // password left blank intentionally
    openModal('student-modal');
  };
  document.getElementById('student-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const method = editId ? 'PUT' : 'POST';
    const url = editId ? `/api/admin/students/${editId}` : '/api/admin/students';
    try {
      const res = await fetch(url,{ method, headers:{ Authorization:'Bearer '+token }, body:fd });
      if (!res.ok) throw new Error(await res.text());
      toast('Student saved','success');
      closeModal('student-modal');
      loadStudents();
    } catch (err) { toast('Save failed','error'); }
  });

  // Delete
  window.deleteStudent = async (id) => {
    if (!confirm('Delete this student?')) return;
    try {
      const res = await fetch(`/api/admin/students/${id}`,{ method:'DELETE', headers:{ Authorization:'Bearer '+token } });
      if (!res.ok) throw new Error(await res.text());
      toast('Student deleted','success');
      loadStudents();
    } catch (e) { toast('Delete failed','error'); }
  };

  // Import
  window.openImportModal = () => openModal('import-modal');
  document.getElementById('import-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      const res = await fetch('/admin/bulk-import/students',{ method:'POST', headers:{ Authorization:'Bearer '+token }, body:fd });
      const data = await res.json();
      if (res.ok) { toast(`✅ Created ${data.created_students} students`,'success'); closeModal('import-modal'); loadStudents(); }
      else { const a=document.getElementById('import-alert'); a.textContent=data.error||'Upload failed'; a.classList.remove('hidden'); }
    } catch (err) { const a=document.getElementById('import-alert'); a.textContent='Network error'; a.classList.remove('hidden'); }
  });

  // Init
  loadStudents();
  document.getElementById('btn-add-student').addEventListener('click', openStudentModal);
  document.getElementById('btn-import-students').addEventListener('click', openImportModal);
</script>
