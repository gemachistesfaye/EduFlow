<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grades | EduFlow Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/theme.css">
  <style>
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:#fff;border-radius:14px;padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  </style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">🎓</div>
      <div><div class="sidebar-logo-text">EduFlow</div><div class="sidebar-logo-sub">School Navigator</div></div>
    </div>
    <div class="sidebar-section-label">Main</div>
    <nav>
      <a href="dashboard.html"  class="nav-item">🏠 &nbsp;Dashboard</a>
      <a href="students.html"   class="nav-item">👥 &nbsp;Students</a>
      <a href="teachers.html"   class="nav-item">🧑‍🏫 &nbsp;Teachers</a>
      <a href="classes.html"    class="nav-item">🏫 &nbsp;Classes</a>
      <a href="attendance.html" class="nav-item">📅 &nbsp;Attendance</a>
      <a href="grades.html"     class="nav-item active">📈 &nbsp;Grades</a>
      <div class="sidebar-section-label">System</div>
      <a href="settings.html"   class="nav-item">⚙️ &nbsp;Settings</a>
    </nav>
    <div class="sidebar-footer">
      <button id="logout-btn" style="display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;border:none;background:rgba(239,68,68,.12);color:#f87171;font-size:13px;font-weight:600;cursor:pointer;width:100%;">🚪 &nbsp;Logout</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="top-header">
      <div class="header-search">🔍 <input placeholder="Search grades…" type="text" id="search-input"></div>
      <div class="header-right">
        <div class="header-user"><div class="header-avatar">A</div><span>Admin</span></div>
      </div>
    </header>

    <div class="page-body">
      <div class="page-title-row">
        <div><div class="page-title">Grades</div><div class="page-subtitle">View and manage student grades</div></div>
      </div>

      <!-- Filters -->
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;">
        <select class="form-select" style="width:auto;" id="filter-exam">
          <option value="">All Exam Types</option>
          <option>Quiz</option><option>Mid</option><option>Final</option>
        </select>
      </div>

      <div class="card">
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead><tr><th>Student</th><th>Course</th><th>Exam Type</th><th>Score</th><th>Total</th><th>%</th><th>Grade</th></tr></thead>
            <tbody id="grades-tbody">
              <tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">Loading grades…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>


<script>
  const token = localStorage.getItem('access_token');
  if (!token) window.location.href = '../../login.html';
  document.getElementById('logout-btn').onclick = () => { localStorage.removeItem('access_token'); window.location.href='../../login.html'; };

  function letterGrade(pct) {
    if (pct>=90) return '<span class="badge badge-green">A+</span>';
    if (pct>=80) return '<span class="badge badge-green">A</span>';
    if (pct>=70) return '<span class="badge badge-blue">B</span>';
    if (pct>=60) return '<span class="badge badge-blue">C</span>';
    if (pct>=50) return '<span class="badge badge-amber">D</span>';
    return '<span class="badge badge-red">F</span>';
  }

  let all = [];
  async function load() {
    try {
      const res = await fetch('/api/admin/grades', { headers:{ Authorization:'Bearer '+token } });
      const data = await res.json();
      all = data.grades || data || [];
      render(all);
    } catch { document.getElementById('grades-tbody').innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">Could not load grades.</td></tr>'; }
  }

  function render(list) {
    const tb = document.getElementById('grades-tbody');
    if (!list.length) { tb.innerHTML='<tr><td colspan="7" style="text-align:center;padding:40px;">No grades found.</td></tr>'; return; }
    tb.innerHTML = list.map(g => {
      const pct = Math.round(g.score / g.total_marks * 100);
      return `<tr>
        <td style="font-weight:500;">Student #${g.student_id}</td>
        <td>Course #${g.course_id}</td>
        <td><span class="badge badge-gray">${g.exam_type}</span></td>
        <td>${g.score}</td>
        <td>${g.total_marks}</td>
        <td>${pct}%</td>
        <td>${letterGrade(pct)}</td>
      </tr>`;
    }).join('');
  }

  document.getElementById('search-input').oninput = e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('#grades-tbody tr').forEach(r => r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none');
  };
  document.getElementById('filter-exam').onchange = e => {
    const v = e.target.value;
    render(v ? all.filter(g=>g.exam_type===v) : all);
  };


  load();
</script>
</body>
</html>
