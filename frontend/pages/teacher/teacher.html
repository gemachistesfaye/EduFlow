<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Dashboard – EduFlow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: {
              50: "#eff6ff",
              100: "#dbeafe",
              200: "#bfdbfe",
              300: "#93c5fd",
              400: "#60a5fa",
              500: "#3b82f6",
              600: "#2563eb",
              700: "#1d4ed8",
              800: "#1e40af",
              900: "#1e3a8a",
            },
          },
        },
      },
    };
  </script>
  <style>
    body {font-family:"Inter",sans-serif;}
    .card {@apply bg-gray-800 rounded-xl p-6 shadow-lg;}
    .grid-table {@apply w-full text-sm text-left text-gray-200;}
    .grid-table th {@apply bg-gray-700 px-4 py-2;}
    .grid-table td {@apply bg-gray-800 px-4 py-2 border-t border-gray-700;}
  </style>
</head>
<body class="bg-gray-900 min-h-screen p-8">
  <h1 class="text-3xl font-bold text-white mb-6">Teacher Dashboard</h1>

  <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
    <div class="card"><p class="text-gray-400">Today's Classes</p><p id="today-classes" class="text-2xl font-semibold text-primary-500">—</p></div>
    <div class="card"><p class="text-gray-400">Pending Grades</p><p id="pending-grades" class="text-2xl font-semibold text-primary-500">—</p></div>
  </section>

  <h2 class="text-xl font-semibold text-white mb-4">Weekly Timetable</h2>
  <table class="grid-table">
    <thead>
      <tr><th>Day</th><th>Period</th><th>Subject</th><th>Room</th></tr>
    </thead>
    <tbody id="timetable-body"><!-- rows injected by JS --></tbody>
  </table>

  <script>
    async function loadData() {
      const res = await fetch('/api/teacher/classroom-data');
      const data = await res.json();
      document.getElementById('today-classes').textContent = data.today_classes;
      document.getElementById('pending-grades').textContent = data.pending_grades;
      const tbody = document.getElementById('timetable-body');
      data.timetable.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${r.day}</td><td>${r.period}</td><td>${r.subject}</td><td>${r.room}</td>`;
        tbody.appendChild(tr);
      });
    }
    loadData();
  </script>
</body>
</html>
